name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # 全OSで cpu / gpu / auto の3モードを実行する。
  # GitHub hosted runner のGPU事情:
  #   - macos-15 (arm64): paravirtual GPU 経由で Metal が動く → 実GPUテスト
  #   - ubuntu / windows: GPUなし → gpu/auto はCPUフォールバック経路の検証
  test:
    name: test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release
      - name: Test (cpu / gpu / auto)
        run: ctest --test-dir build -C Release --output-on-failure

  # CUDAツールチェーンのビルド検証。hosted runner にNVIDIAドライバは無いので
  # カーネルはコンパイル・リンクのみ。テスト実行は「ドライバ不在環境での
  # dlopenフォールバック」の検証を兼ねる（これ自体が恒久的なテスト対象）。
  cuda-build:
    name: cuda build+fallback / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # windows-2022 (not -latest): windows-latest moved to Visual Studio 18,
        # which is past nvcc's supported host-compiler window (VS 2017-2022) and
        # hard-errors the PTX build (C1189). VS 2022 is in range. The plain
        # `test` job below stays on windows-latest — only the CUDA/nvcc path
        # needs the pinned toolset.
        os: [ubuntu-latest, windows-2022]
    steps:
      - uses: actions/checkout@v4
      - uses: Jimver/cuda-toolkit@v0.2.19
        with:
          method: network
          sub-packages: '["nvcc", "cudart"]'
      # nvcc -ptx still preprocesses with the host compiler; on Windows that is
      # cl.exe, which msvc-dev-cmd puts on PATH (no-op on Linux via the guard).
      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DTENSORLIB_CUDA=ON
      - name: Build
        run: cmake --build build --config Release
      - name: Test (CPU fallback — no driver on hosted runners)
        run: ctest --test-dir build -C Release --output-on-failure

  # 実CUDA GPUでの実行テストは CI では行わない方針（有料GPU runnerは
  # Org必須+従量課金、self-hostedは管理の手間があるため断念。2026-07）。
  # CUDAの数値回帰は NVIDIA 実機で `ctest --test-dir build` を手動実行する。
  # 将来方針を変える場合はランナーを登録し HAS_GPU_RUNNER=true で有効化。
  cuda-gpu:
    if: vars.HAS_GPU_RUNNER == 'true'
    name: cuda gpu / self-hosted
    runs-on: [self-hosted, gpu]
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DTENSORLIB_CUDA=ON
      - name: Build
        run: cmake --build build --config Release
      - name: Test (cpu / gpu / auto on real GPU)
        run: ctest --test-dir build -C Release --output-on-failure
