name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # All three modes — cpu / gpu / auto — on every OS.
  # What each hosted runner actually offers:
  #   - macos-15 (arm64): Metal works through a paravirtual GPU -> a real GPU test
  #   - ubuntu / windows: no GPU -> gpu/auto exercise the CPU fallback path
  test:
    name: test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release
      - name: Test (cpu / gpu / auto)
        run: ctest --test-dir build -C Release --output-on-failure

  # Build verification for the CUDA toolchain. Hosted runners have no NVIDIA
  # driver, so the kernels are only compiled and linked. Running the tests here
  # doubles as coverage of the dlopen fallback on a driver-less machine, which
  # is a permanent test target in its own right.
  cuda-build:
    name: cuda build+fallback / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # windows-2022 (not -latest): windows-latest moved to Visual Studio 18,
        # which is past nvcc's supported host-compiler window (VS 2017-2022) and
        # hard-errors the PTX build (C1189). VS 2022 is in range. The plain
        # `test` job below stays on windows-latest — only the CUDA/nvcc path
        # needs the pinned toolset.
        os: [ubuntu-latest, windows-2022]
    steps:
      - uses: actions/checkout@v4
      - uses: Jimver/cuda-toolkit@v0.2.19
        with:
          method: network
          sub-packages: '["nvcc", "cudart"]'
      # nvcc -ptx still preprocesses with the host compiler; on Windows that is
      # cl.exe, which msvc-dev-cmd puts on PATH (no-op on Linux via the guard).
      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DTENSORLIB_CUDA=ON
      - name: Build
        run: cmake --build build --config Release
      - name: Test (CPU fallback — no driver on hosted runners)
        run: ctest --test-dir build -C Release --output-on-failure

  # Build verification for the WebGPU (wasm) backend. Same standing as
  # cuda-build: hosted runners have nowhere to run it — no WebGPU-capable
  # browser, no GPU — so this compiles and links only. What it protects is the
  # C++ side of the TENSORLIB_WEBGPU path: include/webgpu.h, the alias chain in
  # gpu.h, the threshold arm in types.h, none of which an unrelated refactor
  # should be free to rot.
  #
  # One thing it cannot protect, and it is the only place CUDA has the better
  # deal: WGSL is compiled by the browser at run time, so unlike nvcc -ptx the
  # build sees nothing wrong with a broken shader (kernels/*.inc is just a C
  # string). WGSL regressions surface only in the manual browser run below.
  #
  # Numerical regression is a manual run of test/wasm/site/index.html in Chrome
  # — the same arrangement as CUDA's manual ctest on real hardware. That run
  # checks gpu and auto against the ref oracle, and asserts each kernel family
  # dispatched at least once, since the suite goes green even when every op
  # falls back to CPU.
  wasm-build:
    name: wasm build (webgpu) / ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mymindstorm/setup-emsdk@v14
        with:
          # Match the machine this was validated on: --use-port=emdawnwebgpu
          # pulls a Dawn tied to the emsdk version, so moving this moves
          # behaviour.
          version: 6.0.3
      - name: Build (tests + census)
        run: ./test/wasm/build.sh

  # Running the tests on a real CUDA GPU is deliberately out of CI (2026-07):
  # paid GPU runners need an Org and bill per minute, and a self-hosted one is
  # upkeep we chose not to take on. CUDA's numerical regression is instead a
  # manual `ctest --test-dir build` on real NVIDIA hardware.
  # To change that, register a runner and set HAS_GPU_RUNNER=true to enable this.
  cuda-gpu:
    if: vars.HAS_GPU_RUNNER == 'true'
    name: cuda gpu / self-hosted
    runs-on: [self-hosted, gpu]
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DTENSORLIB_CUDA=ON
      - name: Build
        run: cmake --build build --config Release
      - name: Test (cpu / gpu / auto on real GPU)
        run: ctest --test-dir build -C Release --output-on-failure
