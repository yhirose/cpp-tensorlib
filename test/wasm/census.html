<!doctype html>
<meta charset="utf-8">
<title>cpp-tensorlib WebGPU census</title>
<style>
  body { font: 14px ui-monospace, Menlo, monospace; margin: 2rem; max-width: 80rem; }
  pre { background: #f4f4f4; padding: 1rem; overflow-x: auto; white-space: pre-wrap; }
  #status { font-weight: bold; }
</style>
<h1>cpp-tensorlib WebGPU census</h1>
<p id="status">booting…</p>
<p id="adapter"></p>
<pre id="out"></pre>
<script type="module">
  // The census takes minutes, so lines stream into the page as they are
  // printed rather than arriving in one block at the end.
  const status = document.getElementById("status");
  const out = document.getElementById("out");
  const adapter = document.getElementById("adapter");

  const w = new Worker("./census-worker.js", { type: "module" });
  w.onmessage = (e) => {
    const m = e.data;
    if (m.type === "fail") {
      status.textContent = "FAILED";
      out.textContent = m.msg;
      console.error("[census] fail:", m.msg);
    } else if (m.type === "ready") {
      status.textContent = "running census… (minutes)";
      adapter.textContent = "adapter: " + m.adapter;
      console.log("[census] adapter:", m.adapter);
      w.postMessage("go");
    } else if (m.type === "line") {
      out.textContent += m.line + "\n";
      console.log("[census] " + m.line);
    } else if (m.type === "done") {
      status.textContent = m.ok ? "OK" : "FAILED";
      if (!m.ok) out.textContent = m.log;
      console.log("[census] " + (m.ok ? "OK" : "FAILED") + " in " + Math.round(m.ms) + "ms");
      console.log("[census] DONE");
    }
  };
  w.onerror = (e) => {
    status.textContent = "FAILED";
    out.textContent = "worker error: " + e.message;
    console.error("[census] worker error:", e.message);
  };
</script>
