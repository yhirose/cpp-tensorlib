<!doctype html>
<meta charset="utf-8">
<title>cpp-tensorlib WebGPU tests</title>
<style>
  body { font: 14px ui-monospace, Menlo, monospace; margin: 2rem; max-width: 70rem; }
  pre { background: #f4f4f4; padding: 1rem; overflow-x: auto; white-space: pre-wrap; }
  #status { font-weight: bold; }
</style>
<h1>cpp-tensorlib WebGPU tests</h1>
<p id="status">booting…</p>
<p id="adapter"></p>
<pre id="out"></pre>
<script type="module">
  // gpu and auto run here; cpu is already covered by native ctest. gpu proves
  // the WebGPU kernels agree with the ref oracle, auto proves the size-based
  // routing in types.h's TENSORLIB_WEBGPU arm does too — native ctest cannot
  // reach that arm at all.
  const status = document.getElementById("status");
  const out = document.getElementById("out");
  const adapter = document.getElementById("adapter");

  const MODES = ["gpu", "auto"];
  let next = 0;
  let allOk = true;

  const w = new Worker("./worker.js", { type: "module" });
  w.onmessage = (e) => {
    const m = e.data;
    if (m.type === "fail") {
      status.textContent = "FAILED";
      out.textContent = m.msg;
      console.error("[tltest] fail:", m.msg);
    } else if (m.type === "ready") {
      status.textContent = "running tests…";
      adapter.textContent = "adapter: " + m.adapter;
      console.log("[tltest] adapter:", m.adapter);
      w.postMessage(MODES[next++]);
    } else if (m.type === "done") {
      allOk = allOk && m.ok;
      out.textContent += "===== mode=" + m.mode + " =====\n" + m.log + "\n";
      // Console gets a compact one-liner per mode (the full report is in the
      // page): a browser-automation check reads the verdict, not the transcript.
      const tail = m.log.split("\n").filter((l) => /test cases:|assertions:|dispatch |FAIL:|WEBGPU|ERROR:.*validat|is invalid|DEVICE LOST/.test(l));
      console.log("[tltest] " + m.mode + " " + (m.ok ? "OK" : "FAILED") + " in " + Math.round(m.ms) + "ms | " + tail.join(" | ").replace(/\u001b\[[0-9;]*m/g, ""));
      if (next < MODES.length) {
        status.textContent = "running tests… (" + MODES[next] + ")";
        w.postMessage(MODES[next++]);
      } else {
        status.textContent = allOk ? "OK" : "FAILED";
        console.log("[tltest] " + (allOk ? "OK" : "FAILED"));
        console.log("[tltest] DONE");
      }
    }
  };
  w.onerror = (e) => {
    status.textContent = "FAILED";
    out.textContent = "worker error: " + e.message;
    console.error("[tltest] worker error:", e.message);
  };
</script>
