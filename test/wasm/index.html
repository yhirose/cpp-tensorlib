<!doctype html>
<meta charset="utf-8">
<title>cpp-tensorlib WebGPU tests</title>
<style>
  body { font: 14px ui-monospace, Menlo, monospace; margin: 2rem; max-width: 70rem; }
  pre { background: #f4f4f4; padding: 1rem; overflow-x: auto; white-space: pre-wrap; }
  #status { font-weight: bold; }
</style>
<h1>cpp-tensorlib WebGPU tests</h1>
<p id="status">booting…</p>
<p id="adapter"></p>
<pre id="out"></pre>
<script type="module">
  // Only gpu mode runs here: the cpu path is already covered by native ctest,
  // and what this page exists to prove is that the WebGPU backend agrees with
  // the ref oracle.
  const status = document.getElementById("status");
  const out = document.getElementById("out");
  const adapter = document.getElementById("adapter");

  const w = new Worker("./worker.js", { type: "module" });
  w.onmessage = (e) => {
    const m = e.data;
    if (m.type === "fail") {
      status.textContent = "FAILED";
      out.textContent = m.msg;
      console.error("[tltest] fail:", m.msg);
    } else if (m.type === "ready") {
      status.textContent = "running tests…";
      adapter.textContent = "adapter: " + m.adapter;
      console.log("[tltest] adapter:", m.adapter);
      w.postMessage("gpu");
    } else if (m.type === "done") {
      status.textContent = m.ok ? "OK" : "FAILED";
      out.textContent = m.log;
      // Console gets a compact one-liner (the full report is in the page):
      // a browser-automation check reads the verdict, not the transcript.
      const tail = m.log.split("\n").filter((l) => /test cases:|assertions:|dispatch |FAIL:|WEBGPU|ERROR:.*validat|is invalid|DEVICE LOST/.test(l));
      console.log("[tltest] " + (m.ok ? "OK" : "FAILED") + " in " + Math.round(m.ms) + "ms | " + tail.join(" | ").replace(/\u001b\[[0-9;]*m/g, ""));
      console.log("[tltest] DONE");
    }
  };
  w.onerror = (e) => {
    status.textContent = "FAILED";
    out.textContent = "worker error: " + e.message;
    console.error("[tltest] worker error:", e.message);
  };
</script>
